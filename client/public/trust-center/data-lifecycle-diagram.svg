<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1526"/><stop offset="100%" style="stop-color:#111c32"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1b2740" stroke-width="0.35" opacity="0.2"/>
    </pattern>
    <filter id="gG" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/><feFlood flood-color="#34d399" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gT" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/><feFlood flood-color="#309ab0" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gY" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/><feFlood flood-color="#fbbf24" flood-opacity="0.35"/>
      <feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gC" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/><feFlood flood-color="#a78bfa" flood-opacity="0.35"/>
      <feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gR" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#ef4444" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="bigShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="aW" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#475569"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
  </defs>

  <rect width="720" height="580" fill="url(#bg)"/>
  <rect width="720" height="580" fill="url(#grid)"/>

  <!-- Title -->
  <rect x="0" y="0" width="720" height="50" fill="#0d1526" opacity="0.85"/>
  <text x="360" y="24" text-anchor="middle" fill="#e6eaf0" font-size="16" font-weight="700" letter-spacing="2.5">TRUSTDROP · SECRET LIFECYCLE</text>
  <text x="360" y="42" text-anchor="middle" fill="#7d8a9a" font-size="9.5" letter-spacing="2">FROM CREATION TO PERMANENT DELETION</text>

  <!-- Timeline track -->
  <line x1="56" y1="118" x2="664" y2="118" stroke="#1b2740" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="118" x2="560" y2="118" stroke="#309ab0" stroke-width="1.5" opacity="0.2"/>
  <line x1="560" y1="118" x2="664" y2="118" stroke="#ef4444" stroke-width="1.5" opacity="0.25"/>

  <!-- Phase labels -->
  <rect x="180" y="72" width="80" height="18" rx="9" fill="#309ab0" opacity="0.06" stroke="#309ab0" stroke-width="0.6"/>
  <text x="220" y="84" text-anchor="middle" fill="#309ab0" font-size="8" font-weight="600" letter-spacing="1">● ALIVE</text>
  <rect x="580" y="72" width="94" height="18" rx="9" fill="#ef4444" opacity="0.05" stroke="#ef4444" stroke-width="0.6"/>
  <text x="627" y="84" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600" letter-spacing="1">◼ DESTROYED</text>
  <line x1="658" y1="118" x2="676" y2="118" stroke="#ef4444" stroke-width="2" marker-end="url(#aR)" opacity="0.6"/>

  <!-- NODE 1: Created -->
  <circle cx="72" cy="118" r="14" fill="#0f1a22" stroke="#34d399" stroke-width="2" filter="url(#gG)"/>
  <text x="72" y="122" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">1</text>
  <rect x="24" y="142" width="96" height="50" rx="7" fill="#0f1a22" stroke="#34d399" stroke-width="1" filter="url(#shadow)"/>
  <text x="72" y="162" text-anchor="middle" fill="#34d399" font-size="10.5" font-weight="700">Secret</text>
  <text x="72" y="178" text-anchor="middle" fill="#34d399" font-size="10.5" font-weight="700">Created</text>
  <line x1="72" y1="132" x2="72" y2="142" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <text x="72" y="206" text-anchor="middle" fill="#7d8a9a" font-size="8">Encrypted in browser</text>
  <line x1="86" y1="118" x2="168" y2="118" stroke="#309ab0" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- NODE 2: Stored -->
  <circle cx="184" cy="118" r="14" fill="#131d30" stroke="#309ab0" stroke-width="2" filter="url(#gT)"/>
  <text x="184" y="122" text-anchor="middle" fill="#309ab0" font-size="11" font-weight="700">2</text>
  <rect x="132" y="142" width="104" height="50" rx="7" fill="#131d30" stroke="#309ab0" stroke-width="1" filter="url(#shadow)"/>
  <text x="184" y="162" text-anchor="middle" fill="#309ab0" font-size="10.5" font-weight="700">Ciphertext</text>
  <text x="184" y="178" text-anchor="middle" fill="#309ab0" font-size="10.5" font-weight="700">Stored</text>
  <line x1="184" y1="132" x2="184" y2="142" stroke="#309ab0" stroke-width="1" opacity="0.5"/>
  <text x="184" y="206" text-anchor="middle" fill="#7d8a9a" font-size="8">Server holds blob only</text>
  <line x1="198" y1="118" x2="282" y2="118" stroke="#309ab0" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- NODE 3: Shared -->
  <circle cx="298" cy="118" r="14" fill="#1a1708" stroke="#fbbf24" stroke-width="2" filter="url(#gY)"/>
  <text x="298" y="122" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">3</text>
  <rect x="252" y="142" width="92" height="50" rx="7" fill="#1a1708" stroke="#fbbf24" stroke-width="1" filter="url(#shadow)"/>
  <text x="298" y="162" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="700">Link</text>
  <text x="298" y="178" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="700">Shared</text>
  <line x1="298" y1="132" x2="298" y2="142" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <text x="298" y="206" text-anchor="middle" fill="#7d8a9a" font-size="8">Out-of-band delivery</text>
  <line x1="312" y1="118" x2="398" y2="118" stroke="#309ab0" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- NODE 4: Fetched & Decrypted -->
  <circle cx="414" cy="118" r="14" fill="#131525" stroke="#a78bfa" stroke-width="2" filter="url(#gC)"/>
  <text x="414" y="122" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">4</text>
  <rect x="362" y="142" width="104" height="50" rx="7" fill="#131525" stroke="#a78bfa" stroke-width="1" filter="url(#shadow)"/>
  <text x="414" y="162" text-anchor="middle" fill="#a78bfa" font-size="10.5" font-weight="700">Fetched &amp;</text>
  <text x="414" y="178" text-anchor="middle" fill="#a78bfa" font-size="10.5" font-weight="700">Decrypted</text>
  <line x1="414" y1="132" x2="414" y2="142" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <text x="414" y="206" text-anchor="middle" fill="#7d8a9a" font-size="8">Browser decrypts locally</text>
  <line x1="428" y1="118" x2="530" y2="118" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- NODE 5: Deleted -->
  <circle cx="546" cy="118" r="16" fill="#1a0f16" stroke="#ef4444" stroke-width="2.5" filter="url(#gR)"/>
  <line x1="539" y1="111" x2="553" y2="125" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="553" y1="111" x2="539" y2="125" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="492" y="142" width="108" height="50" rx="7" fill="#1a0f16" stroke="#ef4444" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="546" y="162" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="800">PERMANENTLY</text>
  <text x="546" y="178" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="800">DELETED</text>
  <line x1="546" y1="134" x2="546" y2="142" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <text x="546" y="206" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">No recovery possible</text>

  <!-- Time arrow -->
  <line x1="56" y1="224" x2="620" y2="224" stroke="#475569" stroke-width="1" marker-end="url(#aW)" opacity="0.4"/>
  <text x="340" y="238" text-anchor="middle" fill="#475569" font-size="8.5" letter-spacing="3" font-weight="500">TIME →</text>

  <!-- DELETION TRIGGERS -->
  <rect x="36" y="260" width="648" height="28" rx="6" fill="#ef4444" opacity="0.03" stroke="#ef4444" stroke-width="0.6"/>
  <circle cx="56" cy="274" r="4" fill="#ef4444" filter="url(#gR)"/>
  <text x="68" y="279" fill="#ef4444" font-size="11" font-weight="700" letter-spacing="1.5">DELETION TRIGGERS</text>
  <text x="280" y="279" fill="#7d8a9a" font-size="9">Whichever condition is met first — checked independently</text>
  <line x1="360" y1="288" x2="360" y2="302" stroke="#ef4444" stroke-width="0.8" opacity="0.3"/>

  <!-- Trigger 1: Viewed -->
  <rect x="36" y="302" width="200" height="100" rx="8" fill="#131d30" stroke="#ef4444" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="36" y="302" width="200" height="28" rx="8" fill="#ef4444" opacity="0.03"/>
  <rect x="36" y="322" width="200" height="8" rx="0" fill="#ef4444" opacity="0.03"/>
  <circle cx="56" cy="316" r="6" fill="none" stroke="#f87171" stroke-width="1"/>
  <circle cx="56" cy="316" r="2" fill="#f87171"/>
  <text x="70" y="320" fill="#f87171" font-size="10.5" font-weight="700">VIEWED</text>
  <text x="50" y="348" fill="#b8c0cc" font-size="10">View limit reached</text>
  <text x="50" y="366" fill="#7d8a9a" font-size="9">Default: <tspan fill="#f87171" font-weight="600">1 view</tspan> (burn after reading)</text>
  <text x="50" y="382" fill="#7d8a9a" font-size="9">Configurable: 1–100 views</text>
  <text x="50" y="396" fill="#596679" font-size="8.5">Counter decrements on each access</text>

  <!-- Trigger 2: Expired -->
  <rect x="260" y="302" width="200" height="100" rx="8" fill="#131d30" stroke="#ef4444" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="260" y="302" width="200" height="28" rx="8" fill="#ef4444" opacity="0.03"/>
  <rect x="260" y="322" width="200" height="8" rx="0" fill="#ef4444" opacity="0.03"/>
  <circle cx="280" cy="316" r="6" fill="none" stroke="#f87171" stroke-width="1"/>
  <line x1="280" y1="313" x2="280" y2="316" stroke="#f87171" stroke-width="1.2"/>
  <line x1="280" y1="316" x2="283" y2="318" stroke="#f87171" stroke-width="1.2"/>
  <text x="294" y="320" fill="#f87171" font-size="10.5" font-weight="700">EXPIRED</text>
  <text x="274" y="348" fill="#b8c0cc" font-size="10">Time-to-live exceeded</text>
  <text x="274" y="366" fill="#7d8a9a" font-size="9">Options: <tspan fill="#f87171" font-weight="600">1h · 24h · 7d</tspan></text>
  <text x="274" y="382" fill="#7d8a9a" font-size="9">Checked on next access attempt</text>
  <text x="274" y="396" fill="#596679" font-size="8.5">TTL set at creation, immutable</text>

  <!-- Trigger 3: Wrong Password -->
  <rect x="484" y="302" width="200" height="100" rx="8" fill="#131d30" stroke="#ef4444" stroke-width="0.8" filter="url(#shadow)"/>
  <rect x="484" y="302" width="200" height="28" rx="8" fill="#ef4444" opacity="0.03"/>
  <rect x="484" y="322" width="200" height="8" rx="0" fill="#ef4444" opacity="0.03"/>
  <path d="M504 310 L498 313 L498 318 C498 321 500 323 504 325 C508 323 510 321 510 318 L510 313 Z" fill="none" stroke="#f87171" stroke-width="1"/>
  <line x1="502" y1="316" x2="506" y2="320" stroke="#f87171" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="506" y1="316" x2="502" y2="320" stroke="#f87171" stroke-width="1.2" stroke-linecap="round"/>
  <text x="518" y="320" fill="#f87171" font-size="10.5" font-weight="700">WRONG PASSWORD</text>
  <text x="498" y="348" fill="#b8c0cc" font-size="10">Auto-destruct triggered</text>
  <text x="498" y="366" fill="#7d8a9a" font-size="9">Requires: <tspan fill="#f87171" font-weight="600">auto-destruct enabled</tspan></text>
  <text x="498" y="382" fill="#7d8a9a" font-size="9">Failed password attempt = instant</text>
  <text x="498" y="396" fill="#596679" font-size="8.5">Opt-in feature per secret</text>

  <!-- OR badges -->
  <rect x="240" y="338" width="18" height="18" rx="9" fill="#1a0f16" stroke="#ef4444" stroke-width="0.8"/>
  <text x="249" y="351" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="700">OR</text>
  <rect x="464" y="338" width="18" height="18" rx="9" fill="#1a0f16" stroke="#ef4444" stroke-width="0.8"/>
  <text x="473" y="351" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="700">OR</text>

  <!-- Merge lines to finality -->
  <line x1="136" y1="402" x2="136" y2="426" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="402" x2="360" y2="426" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <line x1="584" y1="402" x2="584" y2="426" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <line x1="136" y1="426" x2="584" y2="426" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="426" x2="360" y2="440" stroke="#ef4444" stroke-width="1.2" marker-end="url(#aR)" opacity="0.5"/>

  <!-- Finality box -->
  <rect x="120" y="446" width="480" height="62" rx="10" fill="#1a0f16" stroke="#ef4444" stroke-width="1.5" filter="url(#bigShadow)"/>
  <rect x="120" y="446" width="480" height="24" rx="10" fill="#ef4444" opacity="0.04"/>
  <rect x="120" y="462" width="480" height="8" rx="0" fill="#ef4444" opacity="0.04"/>
  <g transform="translate(142, 458)">
    <rect x="-5" y="-5" width="10" height="10" rx="2" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.8"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <text x="158" y="462" fill="#ef4444" font-size="10.5" font-weight="700" letter-spacing="1">PERMANENT &amp; IRREVERSIBLE</text>
  <text x="142" y="484" fill="#b8c0cc" font-size="10.5">Ciphertext is permanently removed from the database.</text>
  <text x="142" y="500" fill="#7d8a9a" font-size="10">No recycle bin. No recovery mechanism. No backups retained. <tspan fill="#ef4444" font-weight="600">Gone forever.</tspan></text>

  <!-- Legend -->
  <rect x="36" y="528" width="648" height="36" rx="6" fill="#131d30" stroke="#1b2740" stroke-width="0.6"/>
  <circle cx="60" cy="546" r="5" fill="#0f1a22" stroke="#34d399" stroke-width="1.2"/>
  <text x="72" y="550" fill="#7d8a9a" font-size="9">Created</text>
  <circle cx="136" cy="546" r="5" fill="#131d30" stroke="#309ab0" stroke-width="1.2"/>
  <text x="148" y="550" fill="#7d8a9a" font-size="9">Stored</text>
  <circle cx="204" cy="546" r="5" fill="#1a1708" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="216" y="550" fill="#7d8a9a" font-size="9">Shared</text>
  <circle cx="280" cy="546" r="5" fill="#131525" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="292" y="550" fill="#7d8a9a" font-size="9">Fetched</text>
  <circle cx="358" cy="546" r="5" fill="#1a0f16" stroke="#ef4444" stroke-width="1.5"/>
  <text x="370" y="550" fill="#7d8a9a" font-size="9">Deleted</text>
  <line x1="440" y1="546" x2="462" y2="546" stroke="#309ab0" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="470" y="550" fill="#7d8a9a" font-size="9">Lifecycle progression</text>
  <rect x="588" y="540" width="12" height="12" rx="2" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.6"/>
  <text x="608" y="550" fill="#7d8a9a" font-size="9">Deletion trigger</text>
</svg>